<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baldi's Basics in Education and Learning</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .container {
      width: min(100%, 1280px);
      padding: 1rem;
      text-align: center;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2rem, 4vw, 3.25rem);
    }
    p {
      margin: 0 0 1.25rem;
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.6;
    }
    iframe {
      width: 100%;
      min-height: 700px;
      border: 4px solid #334155;
      border-radius: 20px;
      background: #000;
    }
    a {
      color: #60a5fa;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .footer {
      margin-top: 1rem;
      color: #94a3b8;
      font-size: 0.95rem;
    }
  </style>
    <link rel="stylesheet" href="baldis-basics/styles.css" />
</head>
<body>
  <div class="container">
    <h1>Baldi's Basics</h1>
    <p>Play the official Baldi's Basics in Education and Learning game below. This site now loads the local Baldi files instead of the external embed.</p>
    <div id="baldi-game" class="baldi-game">
      <p>Loading Baldi's Basics...</p>
    </div>
    <script defer src="baldis-basics/loader.js"></script>
    <div class="footer">If the local files are missing, add the Baldi's Basics game assets into the <code>baldis-basics</code> folder.</div>

</html>
